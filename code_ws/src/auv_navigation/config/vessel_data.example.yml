# Example vessel file for auv_navigation (copy and pass with:
#   ros2 run auv_navigation navigation_node --ros-args -p vessel_data_file:=/path/to/vessel_data.yml
# or set env AUV_VESSEL_DATA).
#
# Driver packages live under repo: packages/
#   - sbg_ros2_driver → imu/data (SBG in dry enclosure: imu/pres is not used for navigation)
#   - arduino_ps → /auv/depth (Float32, m) for depth fusion
#   - dvl-a50 → /dvl/data (dvl_msgs/DVL), /dvl/position (dvl_msgs/DVLDR)
#
# Navigation package source: code_ws/src/auv_navigation/
#
# --- Flat seabed (for PING_RANGE / altimeter fusion) ---
# NED: z positive DOWN from your navigation origin (same frame as vehicle pose z).
# seabed_z_ned is the constant NED z-coordinate of the seafloor (meters).
# Example: origin at surface → seabed 30 m below → seabed_z_ned: 30.0
# Required at this top level whenever you list sensor_type: PING_RANGE.
seabed_z_ned: 30.0

time_step: 0.1
gps_datum: [0.0, 0.0, 0.0]

agents:
  - id: 1
    name: auv
    apply_prefix: false
    odometry_topic: navigation/odometry
    state_topic: navigation/state
    thrusters: null
    control_surfaces: null
    sensors:
      - sensor_type: IMU
        sensor_topic: /imu/data
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
      # Depth in metres from Arduino (MCU converts pressure → depth; only /auv/depth is fused here)
      - sensor_type: ARDUINO_DEPTH
        sensor_topic: /auv/depth
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        sign_scale: 1.0
        z_offset: 0.0
        default_variance: 0.15
      - sensor_type: DVL
        sensor_topic: /dvl/data
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        default_velocity_variance: 0.05
      - sensor_type: DVL_DR
        sensor_topic: /dvl/position
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        # DVL dead-reckoned position drifts: keep measurement noise conservative (m^2 per axis, then scaled)
        min_position_variance: 0.5
        position_variance_scale: 2.0
      # Ping / Ping2 altimeter: sensor_msgs/Range (e.g. ping_sonar_ros → /ping1d/range)
      - sensor_type: PING_RANGE
        sensor_topic: /ping1d/range
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        default_variance: 0.04
        # Optional: override global seabed_z_ned for this sensor only
        # seabed_z_ned: 30.0
