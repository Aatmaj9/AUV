# Example vessel file for package `navigation` (same schema as auv_navigation).
#
#   ros2 run navigation navigation_node --ros-args -p vessel_data_file:=/path/to/vessel_data.yml
# or set AUV_VESSEL_DATA.
#
# Optional: reject measurement updates when Mahalanobis distance^2 exceeds this value
# (tune per application; leave unset to disable gating).
# mahalanobis_gate: 25.0
#
seabed_z_ned: 3.0

time_step: 0.1
gps_datum: [0.0, 0.0, 0.0]

agents:
  - id: 1
    name: auv
    apply_prefix: false
    odometry_topic: navigation/odometry
    state_topic: navigation/state
    thrusters: null
    control_surfaces: null
    sensors:
      - sensor_type: IMU
        sensor_topic: /imu/data
        sensor_location: [0.3591, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
      - sensor_type: ARDUINO_DEPTH
        sensor_topic: /auv/depth
        sensor_location: [-0.371978, 0.0, 0.360633]
        sensor_orientation: [0.0, 0.0, 0.0]
        sign_scale: 1.0
        z_offset: 0.0
        default_variance: 0.15
      - sensor_type: DVL
        sensor_topic: /dvl/data
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        default_velocity_variance: 0.05
      - sensor_type: DVL_DR
        sensor_topic: /dvl/position
        sensor_location: [0.0, 0.0, 0.0]
        sensor_orientation: [0.0, 0.0, 0.0]
        min_position_variance: 0.5
        position_variance_scale: 2.0
      - sensor_type: PING_RANGE
        sensor_topic: /ping1d/range
        sensor_location: [-0.307062, 0.0, 0.14738]
        sensor_orientation: [0.0, 0.0, 0.0]
        default_variance: 0.04
